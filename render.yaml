services:
  - type: web
    name: similia-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://similia.co.il
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: RECIPIENT_EMAIL
        value: similiaschool.info@gmail.com
      - key: RESEND_API_KEY
        sync: false
